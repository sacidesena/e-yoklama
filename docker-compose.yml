
services:
  db:
    image: mysql:8.0
    container_name: eyoklama-db
    environment:
      MYSQL_ROOT_PASSWORD: 12345678
      MYSQL_DATABASE: ibu_yoklama
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql

  backend:
    build: ./backend
    container_name: eyoklama-backend
    env_file:
      - ./backend/.env
    ports:
      - "8000:8000"
    depends_on:
      - db
    restart: on-failure
          

  frontend:
    build: ./frontend
    container_name: eyoklama-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend

  admin-panel:
    build: ./admin-panel
    container_name: eyoklama-admin
    ports:
      - "8080:8080"
    depends_on:
      - backend

volumes:
  db_data:

volumes:
  - mysql_data:/var/lib/mysql

volumes:
  mysql_data: